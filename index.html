<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 פנטומימה של פסח</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Rubik:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #C9A84C;
  --gold-light: #E8D48B;
  --deep-blue: #0f0f2e;
  --purple: #1a1245;
  --wine: #722F37;
  --wine-light: #9B4D55;
  --cream: #FFF8E7;
  --green: #4CAF50;
  --red: #E53935;
}

body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(180deg, #0a0a20 0%, var(--deep-blue) 50%, #0d0d28 100%);
  color: var(--cream);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(1.5px 1.5px at 15% 25%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,0.15), transparent),
    radial-gradient(1.5px 1.5px at 85% 75%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 750px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ========= WELCOME ========= */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  animation: fadeUp .8s ease;
}

#welcome .icon { font-size: 4rem; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }

#welcome h1 {
  font-family: 'Rubik', sans-serif;
  font-size: 3.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

#welcome .sub {
  font-size: 1.25rem;
  color: var(--gold-light);
  opacity: .85;
  margin-bottom: 25px;
}

#welcome .rules {
  font-size: 1.05rem;
  line-height: 2;
  opacity: .7;
  margin-bottom: 30px;
}

.btn-main {
  background: linear-gradient(135deg, var(--wine), var(--wine-light));
  color: var(--cream);
  border: 3px solid var(--gold);
  padding: 16px 55px;
  font-size: 1.5rem;
  font-family: 'Rubik', sans-serif;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  transition: all .3s;
  box-shadow: 0 8px 30px rgba(201,168,76,.25);
}
.btn-main:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 40px rgba(201,168,76,.45); }

/* ========= GAME ========= */
#game { display:none; }

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.q-num { font-size: 1.1rem; color: var(--gold-light); }
.score-label { font-size: 1.1rem; color: var(--gold); font-weight: 700; }

.progress { width:100%; height:7px; background:rgba(255,255,255,.08); border-radius:10px; margin-bottom:18px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:10px; transition:width .5s ease; width:0; }

/* Stage */
.stage {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 18px;
  overflow: hidden;
  border: 3px solid var(--gold);
  background: #000;
  margin-bottom: 20px;
  box-shadow: 0 15px 50px rgba(0,0,0,.6);
}

.stage video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.stage .play-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background .3s;
  z-index: 5;
}
.stage .play-overlay:hover { background: rgba(0,0,0,.3); }
.stage .play-overlay.hidden { display: none; }

.play-circle {
  width: 72px;
  height: 72px;
  background: rgba(201,168,76,.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .3s;
}
.play-overlay:hover .play-circle { transform: scale(1.12); }
.play-circle::after {
  content: '';
  width: 0; height: 0;
  border-style: solid;
  border-width: 14px 0 14px 26px;
  border-color: transparent transparent transparent var(--deep-blue);
  margin-right: -5px;
}

/* Timer badge - hidden */
.timer-badge { display: none; }

/* Loading spinner */
.loading-spinner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.7);
  z-index: 8;
}
.loading-spinner.hidden { display: none; }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(201,168,76,.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Answer area */
.answer-section {
  text-align: center;
  margin-bottom: 15px;
}

.answer-section h3 {
  font-size: 1.35rem;
  margin-bottom: 14px;
  color: var(--cream);
}

.answer-row {
  display: flex;
  gap: 10px;
  max-width: 500px;
  margin: 0 auto;
}

.answer-input {
  flex: 1;
  padding: 14px 20px;
  font-size: 1.2rem;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  border: 2px solid rgba(201,168,76,.35);
  border-radius: 14px;
  background: rgba(255,255,255,.06);
  color: var(--cream);
  outline: none;
  text-align: center;
  transition: border-color .3s;
}
.answer-input:focus { border-color: var(--gold); }
.answer-input::placeholder { color: rgba(255,248,231,.3); }
.answer-input:disabled { opacity: .5; }

.submit-btn {
  padding: 14px 28px;
  font-size: 1.1rem;
  font-family: 'Heebo', sans-serif;
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep-blue);
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: all .3s;
}
.submit-btn:hover:not(:disabled) { transform: scale(1.05); }
.submit-btn:disabled { opacity: .4; cursor: default; }

/* Feedback */
.feedback {
  text-align: center;
  min-height: 50px;
  font-size: 1.2rem;
  font-weight: 700;
  margin: 12px 0;
  padding: 10px;
  border-radius: 12px;
  transition: all .3s;
}
.feedback.correct { color: var(--green); background: rgba(76,175,80,.1); }
.feedback.wrong { color: var(--red); background: rgba(229,57,53,.1); }

.next-btn {
  display: none;
  margin: 0 auto;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--deep-blue);
  border: none;
  padding: 13px 45px;
  font-size: 1.15rem;
  font-family: 'Rubik', sans-serif;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  transition: all .3s;
}
.next-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(201,168,76,.35); }

/* ========= RESULTS ========= */
#results {
  display: none;
  text-align: center;
  min-height: 100vh;
  padding-top: 70px;
  animation: fadeUp .8s ease;
}

#results h2 {
  font-family: 'Rubik', sans-serif;
  font-size: 2.6rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 15px;
}

.big-score { font-size: 5rem; font-weight: 900; margin: 15px 0; }
.stars { font-size: 2.8rem; margin: 15px 0; }
.result-msg { font-size: 1.3rem; color: var(--gold-light); line-height: 1.9; margin-bottom: 25px; }

/* Summary table */
.summary-table {
  width: 100%;
  max-width: 550px;
  margin: 0 auto 30px;
  border-collapse: collapse;
}
.summary-table th {
  padding: 10px;
  font-size: .95rem;
  color: var(--gold);
  border-bottom: 2px solid rgba(201,168,76,.3);
}
.summary-table td {
  padding: 10px 8px;
  font-size: 1rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.summary-table .icon-cell { font-size: 1.3rem; }

/* ========= CONFETTI ========= */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.confetti-piece {
  position:absolute;
  width:10px; height:10px;
  top:-12px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(105vh) rotate(720deg); opacity:0; }
}

/* ========= ANIMS ========= */
@keyframes fadeUp { from { opacity:0; transform:translateY(25px); } to { opacity:1; transform:translateY(0); } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }

@media (max-width:600px) {
  #welcome h1 { font-size: 2.2rem; }
  .answer-row { flex-direction: column; }
  .submit-btn { width: 100%; }
  .big-score { font-size: 3.5rem; }
}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="container">
  <div class="icon">🎭</div>
  <h1>פנטומימה של פסח</h1>
  <p class="sub">מצליחים לנחש מה הוא מדגים?</p>
  <div class="rules">
    10 סרטונים &bull; גבר חרדי על במה &bull; בלי מילים &bull; בלי אביזרים<br>
    כתבו את התשובה &bull; 100 נקודות על כל תשובה נכונה
  </div>
  <button class="btn-main" onclick="startGame()">🎬 יאללה, מתחילים!</button>
</div>

<!-- GAME -->
<div id="game" class="container">
  <div class="top-bar">
    <span class="q-num" id="qNum">שאלה 1 מתוך 10</span>
    <span class="score-label" id="scoreLbl">ניקוד: 0</span>
  </div>
  <div class="progress"><div class="progress-bar" id="progBar"></div></div>

  <div class="stage" id="stage">
    <video id="vid" playsinline preload="auto" crossorigin="anonymous"></video>
    <div class="loading-spinner" id="loadSpinner">
      <div class="spinner"></div>
      <div style="margin-top:10px;font-size:.95rem;color:var(--gold-light)">טוען סרטון...</div>
    </div>
    <div class="play-overlay" id="playOverlay" onclick="playVideo()">
      <div class="play-circle"></div>
    </div>
    <div class="timer-badge" id="timer">10</div>
  </div>

  <div class="answer-section">
    <h3>מה הדמות מדגימה? 🤔</h3>
    <div id="attemptsLbl" style="font-size:.95rem;color:var(--gold-light);opacity:.7;margin-bottom:10px;">נסיון 1 מתוך 2</div>
    <div class="answer-row">
      <input type="text" class="answer-input" id="ansInput" placeholder="כתבו את התשובה כאן..." autocomplete="off">
      <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">שלח</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">השאלה הבאה ←</button>
</div>

<!-- RESULTS -->
<div id="results" class="container">
  <h2>🎭 סיום המשחק!</h2>
  <div class="big-score" id="bigScore"></div>
  <div class="stars" id="resStars"></div>
  <div class="result-msg" id="resMsg"></div>
  <table class="summary-table" id="summaryTable">
    <thead><tr><th></th><th>נושא</th><th>התשובה שלך</th><th>תוצאה</th></tr></thead>
    <tbody id="summaryBody"></tbody>
  </table>
  <button class="btn-main" onclick="restart()">🔄 שחק שוב</button>
</div>

<script>
const questions = [
  {
    id: "matza", topic: "מצה",
    url: "https://v3b.fal.media/files/b/0a951400/F_SvrAnnO0RkfVqmmTaOm_output.mp4",
    accepted: ["מצה","מצות","מצו","matza","matzah","matzo","מאצה"],
    hint: "הדמות שיטחה בצק דק ושברה אותו - מצה!"
  },
  {
    id: "maror", topic: "מרור",
    url: "https://v3b.fal.media/files/b/0a951408/FYC0URfN7Ieug-w42x5XY_output.mp4",
    accepted: ["מרור","חריין","maror","חרין"],
    hint: "הדמות אכלה משהו ועשתה פרצוף מריר - מרור!"
  },
  {
    id: "four_cups", topic: "ארבע כוסות",
    url: "https://v3b.fal.media/files/b/0a951410/TSaJdeExQDf6uULfDRBxT_output.mp4",
    accepted: ["ארבע כוסות","4 כוסות","כוסות","ארבע כוסות יין","כוסות יין","four cups","ד כוסות","ד' כוסות"],
    hint: "הדמות שתתה שוב ושוב - ארבע כוסות!"
  },
  {
    id: "haseba", topic: "הסבה",
    url: "https://v3b.fal.media/files/b/0a951417/bJU3yAUO0Al4quJ9eEvD2_output.mp4",
    accepted: ["הסבה","הסיבה","מיסב","haseba","הסיבא","הסיבה"],
    hint: "הדמות נשענה לצד שמאל - הסבה!"
  },
  {
    id: "afikoman", topic: "אפיקומן",
    url: "https://v3b.fal.media/files/b/0a95141f/3gsyozeR7IQxkQeM_-pgG_output.mp4",
    accepted: ["אפיקומן","אפיקומאן","צפון","afikoman","afikomen"],
    hint: "הדמות הסתירה משהו וחיפשה - אפיקומן!"
  },
  {
    id: "splitting_sea", topic: "קריעת ים סוף",
    url: "https://v3b.fal.media/files/b/0a951426/Q22-jnejxO-DWpK5dumtE_output.mp4",
    accepted: ["קריעת ים סוף","ים סוף","קריעת הים","בקיעת הים","בקיעת ים סוף","splitting the sea","קריעה"],
    hint: "הדמות פרשה ידיים לצדדים בכוח - קריעת ים סוף!"
  },
  {
    id: "slavery", topic: "עבדות במצרים",
    url: "https://v3b.fal.media/files/b/0a95142e/rOLEDGdG6lpXaKCdQ6PNp_output.mp4",
    accepted: ["עבדות","עבדים","עבדות במצרים","שעבוד","עבודת פרך","slavery","עבד"],
    hint: "הדמות כפפה את גופה תחת משא כבד - עבדות במצרים!"
  },
  {
    id: "exodus", topic: "יציאת מצרים",
    url: "https://v3b.fal.media/files/b/0a951435/L-p5rS2DUfDut5bVP_bqf_output.mp4",
    accepted: ["יציאת מצרים","חירות","גאולה","חופש","יציאה ממצרים","exodus","גאולת מצרים"],
    hint: "הדמות צעדה בגאווה עם ידיים מורמות - יציאת מצרים!"
  },
  {
    id: "eliyahu", topic: "אליהו הנביא",
    url: "https://v3b.fal.media/files/b/0a95143d/bJxebWmajUb5ntx58dNDM_output.mp4",
    accepted: ["אליהו הנביא","אליהו","כוס של אליהו","כוס אליהו","פתיחת הדלת","eliyahu","אליהו הנבא"],
    hint: "הדמות פתחה דלת והזמינה אורח - אליהו הנביא!"
  },
  {
    id: "karpas", topic: "כרפס",
    url: "https://v3b.fal.media/files/b/0a951444/dzimE16ukVCi9a9GjoHIa_output.mp4",
    accepted: ["כרפס","טיבול","karpas"],
    hint: "הדמות טבלה משהו בנוזל ואכלה - כרפס!"
  }
];

let cur = 0, score = 0, answered = false, timerInt = null, timeLeft = 10;
let shuffled = [], userAnswers = [], attempts = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.trim().replace(/['"״׳\-–—]/g, '').replace(/\s+/g, ' ').toLowerCase();
}

function startGame() {
  shuffled = shuffle(questions);
  cur = 0; score = 0; answered = false; userAnswers = [];
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  loadQ();
}

function loadQ() {
  answered = false; attempts = 0;
  const q = shuffled[cur];

  document.getElementById('qNum').textContent = `שאלה ${cur + 1} מתוך 10`;
  document.getElementById('scoreLbl').textContent = `ניקוד: ${score}`;
  document.getElementById('progBar').style.width = `${(cur / 10) * 100}%`;
  document.getElementById('attemptsLbl').textContent = 'נסיון 1 מתוך 2';

  const vid = document.getElementById('vid');
  const spinner = document.getElementById('loadSpinner');
  spinner.classList.remove('hidden');
  vid.src = q.url;
  vid.load();
  vid.pause();
  vid.oncanplaythrough = () => {
    spinner.classList.add('hidden');
    vid.oncanplaythrough = null;
  };
  // Fallback hide spinner after 5s
  setTimeout(() => spinner.classList.add('hidden'), 5000);

  document.getElementById('playOverlay').classList.remove('hidden');
  clearInterval(timerInt);

  // Preload next video
  if (cur + 1 < shuffled.length) {
    const link = document.createElement('link');
    link.rel = 'prefetch';
    link.href = shuffled[cur + 1].url;
    document.head.appendChild(link);
  }

  document.getElementById('ansInput').value = '';
  document.getElementById('ansInput').disabled = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';

  document.getElementById('ansInput').focus();
}

function playVideo() {
  document.getElementById('playOverlay').classList.add('hidden');
  const vid = document.getElementById('vid');
  vid.currentTime = 0;
  vid.play();

  vid.loop = true;
}

function checkAnswer() {
  if (answered) return;
  const val = document.getElementById('ansInput').value;
  if (!val.trim()) return;

  attempts++;
  const q = shuffled[cur];
  const norm = normalize(val);
  const isCorrect = q.accepted.some(a => normalize(a) === norm);
  const fb = document.getElementById('feedback');

  if (isCorrect) {
    answered = true;
    document.getElementById('vid').pause();
    document.getElementById('ansInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;
    score += 100;
    fb.innerHTML = `✓ נכון! ${q.hint}`;
    fb.className = 'feedback correct';
    document.getElementById('scoreLbl').textContent = `ניקוד: ${score}`;
    userAnswers.push({ topic: q.topic, answer: val, correct: true });
    const nb = document.getElementById('nextBtn');
    nb.style.display = 'block';
    nb.textContent = cur === 9 ? 'לתוצאות →' : 'השאלה הבאה ←';
  } else if (attempts >= 2) {
    answered = true;
    document.getElementById('vid').pause();
    document.getElementById('ansInput').disabled = true;
    document.getElementById('submitBtn').disabled = true;
    fb.innerHTML = `✗ לא נכון. ${q.hint}`;
    fb.className = 'feedback wrong';
    userAnswers.push({ topic: q.topic, answer: val, correct: false });
    const nb = document.getElementById('nextBtn');
    nb.style.display = 'block';
    nb.textContent = cur === 9 ? 'לתוצאות →' : 'השאלה הבאה ←';
  } else {
    fb.innerHTML = '✗ לא נכון, נסו שוב! נשאר לכם עוד נסיון אחד';
    fb.className = 'feedback wrong';
    document.getElementById('ansInput').value = '';
    document.getElementById('ansInput').focus();
    document.getElementById('attemptsLbl').textContent = 'נסיון 2 מתוך 2';
  }
}

function autoTimeout() {
  answered = true;
  document.getElementById('ansInput').disabled = true;
  document.getElementById('submitBtn').disabled = true;

  const q = shuffled[cur];
  const fb = document.getElementById('feedback');
  fb.innerHTML = `⏰ נגמר הזמן! ${q.hint}`;
  fb.className = 'feedback wrong';

  userAnswers.push({ topic: q.topic, answer: '(לא נענתה)', correct: false });

  const nb = document.getElementById('nextBtn');
  nb.style.display = 'block';
  nb.textContent = cur === 9 ? 'לתוצאות →' : 'השאלה הבאה ←';
}

function nextQuestion() {
  cur++;
  if (cur >= 10) showResults();
  else loadQ();
}

function showResults() {
  document.getElementById('game').style.display = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';
  r.scrollIntoView({ behavior: 'smooth' });

  const pct = score;
  document.getElementById('bigScore').textContent = `${score} / 1000`;
  document.getElementById('bigScore').style.color =
    score >= 600 ? 'var(--gold)' : '#fff';

  let stars = '', msg = '';
  if (score === 1000) {
    stars = '⭐⭐⭐⭐⭐'; msg = 'מושלם! אתה מלך הפנטומימה של פסח!<br>חג פסח כשר ושמח!';
  } else if (score >= 800) {
    stars = '⭐⭐⭐⭐'; msg = 'כל הכבוד! ממש מרשים!<br>חג פסח כשר ושמח!';
  } else if (score >= 600) {
    stars = '⭐⭐⭐'; msg = 'לא רע בכלל!<br>נסה שוב לשפר את הניקוד';
  } else if (score >= 400) {
    stars = '⭐⭐'; msg = 'יש מקום לשיפור...<br>נסה שוב!';
  } else {
    stars = '⭐'; msg = 'הפנטומימה הזו קשוחה!<br>נסה שוב, בטוח תשתפר';
  }
  document.getElementById('resStars').textContent = stars;
  document.getElementById('resMsg').innerHTML = msg;

  // Summary table
  const tbody = document.getElementById('summaryBody');
  tbody.innerHTML = '';
  userAnswers.forEach((ua, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${ua.topic}</td>
      <td>${ua.answer}</td>
      <td class="icon-cell">${ua.correct ? '✅' : '❌'}</td>
    `;
    tbody.appendChild(tr);
  });

  if (score >= 600) launchConfetti();
}

function launchConfetti() {
  const w = document.createElement('div');
  w.className = 'confetti-wrap';
  document.body.appendChild(w);
  const colors = ['#C9A84C','#E8D48B','#722F37','#4CAF50','#fff','#E53935','#2196F3'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (Math.random() * 8 + 5) + 'px';
    p.style.height = (Math.random() * 8 + 5) + 'px';
    p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 2) + 's';
    p.style.animationDelay = (Math.random() * 2) + 's';
    w.appendChild(p);
  }
  setTimeout(() => w.remove(), 5000);
}

function restart() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('welcome').style.display = 'flex';
}

// Enter = submit
document.getElementById('ansInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});
</script>
